name: Frontend CI/CD - Innovatech Chile

on:
  push:
    branches:
      - deploy  # Se activa al hacer push a la rama deploy

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Iniciar sesión en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Construir y Subir Imagen Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/front_despacho:latest

  deploy-to-ec2:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Despliegue automatizado en AWS EC2 vía SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_EC2_FRONT_IP }}
          username: ec2-user
          key: ${{ secrets.AWS_PRIVATE_KEY }}
          script: |
            # 1. Iniciar sesión en Docker Hub dentro de la EC2
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            
            # 2. Detener y eliminar el contenedor anterior si existe
            docker stop front_container || true
            docker rm front_container || true
            
            # 3. Descargar la versión más reciente de la imagen
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/front_despacho:latest
            
            # 4. Ejecutar el nuevo contenedor en el puerto 80
            docker run -d \
              --name front_container \
              -p 80:80 \
              --restart always \
              ${{ secrets.DOCKERHUB_USERNAME }}/front_despacho:latest