name: Frontend CI/CD (Deploy to EC2 via SSH)

on:
  push:
    branches:
      - deploy

jobs:
  deploy-frontend:
    name: Build & Deploy Frontend
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/deploy'
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Iniciar sesión en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Construir y Subir Imagen Docker (Frontend)
        uses: docker/build-push-action@v5
        with:
          # ➡️ Mantenemos el contexto en la raíz para que rastree todo el árbol
          context: .
          file: ./front_despacho/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/front-despacho:latest

      - name: Despliegue en AWS EC2 vía SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_EC2_FRONTEND_IP }}
          username: ec2-user
          key: ${{ secrets.AWS_PRIVATE_KEY }}
          envs: DOCKERHUB_USERNAME,DOCKERHUB_TOKEN
          script: |
            export DOCKERHUB_USERNAME="${{ secrets.DOCKERHUB_USERNAME }}"
            export DOCKERHUB_TOKEN="${{ secrets.DOCKERHUB_TOKEN }}"

            echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
            
            # Detener y eliminar contenedor antiguo si existe
            docker stop frontend-container || true
            docker rm frontend-container || true
            
            # Descargar la nueva imagen construida por el pipeline
            docker pull "$DOCKERHUB_USERNAME/front-despacho:latest"
            
            # Desplegar el contenedor en el puerto 80
            docker run -d \
              --name frontend-container \
              -p 80:80 \
              --restart always \
              "$DOCKERHUB_USERNAME/front-despacho:latest"
            
            # Limpieza de imágenes huérfanas para ahorrar espacio
            docker image prune -f