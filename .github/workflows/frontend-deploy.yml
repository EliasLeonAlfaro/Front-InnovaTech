name: Frontend CI/CD (AWS EKS Deploy)

on:
  push:
    branches:
      - deploy

env:
  AWS_REGION: us-east-1
  EKS_CLUSTER_NAME: TU_NOMBRE_DE_CLUSTER_EKS # ⚠️ Cambia esto por el nombre exacto de tu clúster

jobs:
  build-and-deploy:
    name: Build, Push & Deploy Frontend to EKS
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/deploy'
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Iniciar sesión en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Configurar credenciales de AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }} # Crítico para AWS Academy
          aws-region: ${{ env.AWS_REGION }}

      # -------------------------------------------------------------
      # COMPILACIÓN Y ENVÍO A DOCKER HUB
      # -------------------------------------------------------------
      - name: Construir y Subir Imagen Docker (Frontend)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/front-despacho:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/front-despacho:${{ github.sha }}

      # -------------------------------------------------------------
      # DESPLIEGUE EN AWS EKS
      # -------------------------------------------------------------
      - name: Configurar kubeconfig para EKS
        run: |
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER_NAME }}

      - name: Desplegar Manifiestos actualizados en EKS
        run: |
          # Reemplaza la imagen estática por la recién construida con el tag único del commit
          sed -i 's|image: .*front-despacho:latest|image: ${{ secrets.DOCKERHUB_USERNAME }}/front-despacho:${{ github.sha }}|g' k8s/frontend.yml
          
          # Aplicar despliegue, balanceador y autoescalado en Kubernetes
          kubectl apply -f k8s/frontend.yml
          kubectl apply -f k8s/autoscaling.yml