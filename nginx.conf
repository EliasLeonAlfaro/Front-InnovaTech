server {
    listen 80;
    server_name localhost;

    # 1. Servir el Frontend de React
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
        add_header Cross-Origin-Resource-Policy "cross-origin" always;
     # Buenas prácticas de seguridad complementarias (opcional pero recomendado)
        add_header Access-Control-Allow-Origin "*" always;
    }

    # 2. RUTA SIMPLIFICADA PARA DESPACHOS
    location /api/v1/despachos {
        # Recibe la ruta exacta y se la pasa idéntica al puerto interno 8085
        proxy_pass http://32.196.226.157:8085;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }

    #  3. RUTA SIMPLIFICADA PARA VENTAS
    location /api/v1/ventas {
        # Recibe la ruta exacta y se la pasa idéntica al puerto interno 8086
        proxy_pass http://32.196.226.157:8086;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }
}