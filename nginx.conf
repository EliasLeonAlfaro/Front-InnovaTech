server {
    listen 80;
    server_name localhost;

    # Sirve los archivos estáticos de React
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # REVERSE PROXY: Redirige las peticiones manteniendo el /api/
    location /api/ {
        # ➡️ SOLUCIÓN DE SINTAXIS: Añadimos de nuevo la '/' pero mapeamos la variable del URI completo
        # Esto le dice a Nginx: "Habla con el backend, pero vuelve a escribir /api/v1/despachos al final"
        proxy_pass http://10.0.134.21:8085/$request_uri;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}