server {
    listen 80;
    server_name localhost;

    # Sirve los archivos estáticos de React
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # REVERSE PROXY: Redirige las peticiones de la API al Backend
    location /api/ {
        # Ahora, si el front llama a /api/v1/despachos, llegará EXACTAMENTE así al Spring Boot.
        proxy_pass http://10.0.134.21:8085;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}